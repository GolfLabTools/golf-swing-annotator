<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>swingannotator — Golf Swing Annotation Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0b0b0b;
    --bg-surface: #141414;
    --bg-elevated: #1a1a1a;
    --bg-hover: #222222;
    --accent: #00ff88;
    --accent-dim: rgba(0, 255, 136, 0.15);
    --accent-glow: rgba(0, 255, 136, 0.3);
    --text: #e0e0e0;
    --text-dim: #777;
    --text-muted: #555;
    --border: #2a2a2a;
    --red: #ff4444;
    --danger: #ff3355;
    --radius: 8px;
    --radius-sm: 5px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    height: 50px;
    flex-shrink: 0;
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-brand svg { width: 26px; height: 26px; }
  .header-brand h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* ─── MAIN LAYOUT ─── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ─── LEFT TOOLBAR ─── */
  .toolbar {
    width: 56px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
    flex-shrink: 0;
  }
  .toolbar-section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .tool-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text-dim);
    position: relative;
  }
  .tool-btn:hover {
    background: var(--bg-hover);
    color: var(--text);
    border-color: var(--border);
  }
  .tool-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .tool-btn svg { width: 20px; height: 20px; pointer-events: none; }
  .tool-btn .tooltip {
    position: absolute;
    left: 52px;
    background: var(--bg-elevated);
    color: var(--text);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
  }
  .tool-btn:hover .tooltip { opacity: 1; }

  .toolbar-divider {
    width: 28px;
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  /* ─── COLOR PICKER ─── */
  .color-picker-section {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-bottom: 8px;
  }
  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .color-input-wrapper {
    position: relative;
    width: 32px;
    height: 32px;
  }
  .color-input-wrapper input[type="color"] {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
    border-radius: 50%;
  }
  .color-input-wrapper input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  .color-input-wrapper input[type="color"]::-webkit-color-swatch { border-radius: 50%; border: 2px solid var(--border); }

  /* ─── CANVAS AREA ─── */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #000;
    overflow: hidden;
    min-width: 0;
  }
  .canvas-container {
    position: relative;
    background: #000;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  #videoElement {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }
  #drawCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  /* Upload overlay */
  .upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: radial-gradient(ellipse at center, rgba(0,255,136,0.03) 0%, transparent 70%);
    border: 2px dashed var(--border);
    margin: 20px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .upload-overlay:hover {
    border-color: var(--accent);
    background: radial-gradient(ellipse at center, rgba(0,255,136,0.06) 0%, transparent 70%);
  }
  .upload-overlay.dragover {
    border-color: var(--accent);
    background: rgba(0,255,136,0.05);
  }
  .upload-overlay.hidden { display: none; }
  .upload-icon {
    width: 64px;
    height: 64px;
    margin-bottom: 16px;
    color: var(--accent);
    opacity: 0.6;
  }
  .upload-overlay h2 {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }
  .upload-overlay p {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  #fileInput { display: none; }

  /* Play/pause overlay */
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .play-overlay.show { opacity: 1; }
  .play-overlay-icon {
    width: 64px;
    height: 64px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    backdrop-filter: blur(4px);
  }

  /* ─── RIGHT PANEL ─── */
  .right-panel {
    width: 200px;
    background: var(--bg-surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 16px;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .panel-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .panel-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .panel-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 12px;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all var(--transition);
    width: 100%;
  }
  .panel-btn:hover {
    background: var(--bg-hover);
    border-color: var(--accent);
    color: var(--accent);
  }
  .panel-btn.accent {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .panel-btn.accent:hover {
    background: rgba(0,255,136,0.25);
  }
  .panel-btn.danger:hover {
    border-color: var(--danger);
    color: var(--danger);
  }
  .panel-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Speed control */
  .speed-control {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .speed-btn {
    flex: 1;
    min-width: 40px;
    padding: 6px 2px;
    text-align: center;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all var(--transition);
  }
  .speed-btn:hover { border-color: var(--accent); color: var(--text); }
  .speed-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Frame step */
  .frame-controls {
    display: flex;
    gap: 4px;
  }
  .frame-btn {
    flex: 1;
    padding: 7px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .frame-btn:hover { border-color: var(--accent); color: var(--text); }
  .frame-btn svg { width: 14px; height: 14px; }

  /* Stroke width */
  .stroke-width-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stroke-width-control input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .stroke-width-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  .stroke-width-val {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    min-width: 24px;
    text-align: right;
  }

  /* ─── BOTTOM TIMELINE ─── */
  .timeline-bar {
    height: 56px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .play-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 50%;
    color: var(--accent);
    cursor: pointer;
    transition: all var(--transition);
    flex-shrink: 0;
  }
  .play-btn:hover {
    background: rgba(0,255,136,0.25);
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .play-btn svg { width: 16px; height: 16px; }

  .time-display {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    min-width: 110px;
    flex-shrink: 0;
  }

  .timeline-track {
    flex: 1;
    height: 6px;
    background: var(--bg-hover);
    border-radius: 3px;
    position: relative;
    cursor: pointer;
  }
  .timeline-progress {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    position: relative;
    transition: none;
  }
  .timeline-thumb {
    position: absolute;
    right: -7px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elevated);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 24px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── EXPORT MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    min-width: 320px;
    text-align: center;
  }
  .modal h3 {
    font-size: 16px;
    margin-bottom: 8px;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
  .modal .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--bg-hover);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .modal .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.3s;
  }
  .modal .progress-text {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ─── CURSORS ─── */
  .cursor-crosshair { cursor: crosshair; }
  .cursor-default { cursor: default; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .right-panel { width: 160px; padding: 10px 8px; gap: 10px; }
    .toolbar { width: 48px; }
    .header-brand h1 { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<header class="header">
  <div class="header-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
      <path d="M2 12h20"/>
    </svg>
    <h1>Annotator</h1>
  </div>
  <div class="header-actions">
    <span style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;" id="videoName">No video loaded</span>
  </div>
</header>

<!-- ─── MAIN ─── -->
<div class="main">

  <!-- LEFT TOOLBAR -->
  <div class="toolbar">
    <span class="toolbar-section-label">Draw</span>

    <button class="tool-btn active" data-tool="line" title="Solid Line">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="17" x2="17" y2="3"/></svg>
      <span class="tooltip">Line (L)</span>
    </button>

    <button class="tool-btn" data-tool="dashed" title="Dashed Line">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"><line x1="3" y1="17" x2="17" y2="3"/></svg>
      <span class="tooltip">Dashed (D)</span>
    </button>

    <button class="tool-btn" data-tool="arrow" title="Arrow">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="17" x2="17" y2="3"/><polyline points="10,3 17,3 17,10"/></svg>
      <span class="tooltip">Arrow (A)</span>
    </button>

    <button class="tool-btn" data-tool="circle" title="Circle">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="10" cy="10" rx="7" ry="7"/></svg>
      <span class="tooltip">Circle (C)</span>
    </button>

    <button class="tool-btn" data-tool="rect" title="Rectangle">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="14" height="14" rx="1"/></svg>
      <span class="tooltip">Rectangle (R)</span>
    </button>

    <div class="toolbar-divider"></div>

    <button class="tool-btn" data-tool="freehand" title="Freehand">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 15 Q7 3, 10 10 Q13 17, 17 5"/></svg>
      <span class="tooltip">Freehand (F)</span>
    </button>

    <!-- COLOR PICKER -->
    <div class="color-picker-section">
      <div class="toolbar-divider"></div>
      <span class="toolbar-section-label" style="margin-top:4px">Color</span>
      <div class="color-swatch active" style="background:#ff4444" data-color="#ff4444"></div>
      <div class="color-swatch" style="background:#ffdd00" data-color="#ffdd00"></div>
      <div class="color-swatch" style="background:#00ff88" data-color="#00ff88"></div>
      <div class="color-swatch" style="background:#4488ff" data-color="#4488ff"></div>
      <div class="color-swatch" style="background:#ffffff" data-color="#ffffff"></div>
      <div class="color-input-wrapper">
        <input type="color" id="customColor" value="#ff4444" title="Custom color">
      </div>
    </div>
  </div>

  <!-- CENTER CANVAS -->
  <div class="canvas-area">
    <div class="upload-overlay" id="uploadOverlay">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <h2>Drop your  video here</h2>
      <p>or click to browse</p>
    </div>
    <input type="file" id="fileInput" accept="video/*">

    <div class="canvas-container" id="canvasContainer" style="display:none;">
      <video id="videoElement" preload="auto"></video>
      <canvas id="drawCanvas" class="cursor-crosshair"></canvas>
      <div class="play-overlay" id="playOverlay">
        <div class="play-overlay-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-group">
      <span class="panel-label">Stroke Width</span>
      <div class="stroke-width-control">
        <input type="range" id="strokeWidth" min="1" max="10" value="3">
        <span class="stroke-width-val" id="strokeWidthVal">3px</span>
      </div>
    </div>

    <div class="panel-group">
      <span class="panel-label">Actions</span>
      <button class="panel-btn" id="undoBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Undo
      </button>
      <button class="panel-btn danger" id="clearBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Clear All
      </button>
    </div>

    <div class="panel-group">
      <span class="panel-label">Export</span>
      <button class="panel-btn accent" id="saveBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Save Video
      </button>
    </div>

    <div class="panel-group">
      <span class="panel-label">Speed</span>
      <div class="speed-control">
        <button class="speed-btn" data-speed="0.25">0.25x</button>
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn" data-speed="0.75">0.75x</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="1.5">1.5x</button>
        <button class="speed-btn" data-speed="2">2x</button>
      </div>
    </div>

    <div class="panel-group">
      <span class="panel-label">Frame Step</span>
      <div class="frame-controls">
        <button class="frame-btn" id="prevFrame">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="11 17 6 12 11 7"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
          -1
        </button>
        <button class="frame-btn" id="nextFrame">
          +1
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="13 7 18 12 13 17"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div class="panel-group">
      <span class="panel-label">Session</span>
      <button class="panel-btn" id="saveSession">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Save Session
      </button>
      <button class="panel-btn" id="loadSession">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Load Session
      </button>
      <input type="file" id="sessionInput" accept=".json" style="display:none">
    </div>
  </div>
</div>

<!-- BOTTOM TIMELINE -->
<div class="timeline-bar">
  <button class="play-btn" id="playPauseBtn">
    <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon"><polygon points="6,3 20,12 6,21"/></svg>
    <svg viewBox="0 0 24 24" fill="currentColor" id="pauseIcon" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
  </button>
  <span class="time-display" id="timeDisplay">0:00.00 / 0:00.00</span>
  <div class="timeline-track" id="timelineTrack">
    <div class="timeline-progress" id="timelineProgress">
      <div class="timeline-thumb"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>Exporting Video</h3>
    <p>Combining video with annotations...</p>
    <div class="progress-bar"><div class="progress-fill" id="exportProgress"></div></div>
    <div class="progress-text" id="exportText">0%</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   Golf  Annotation Tool
   ═══════════════════════════════════════ */

// ─── STATE ───
const state = {
  tool: 'line',
  color: '#ff4444',
  strokeWidth: 3,
  strokes: [],       // { type, color, width, points/coords, ... }
  isDrawing: false,
  startX: 0,
  startY: 0,
  currentStroke: null,
  videoLoaded: false,
  playbackRate: 1,
};

// ─── DOM ───
const video = document.getElementById('videoElement');
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');
const uploadOverlay = document.getElementById('uploadOverlay');
const fileInput = document.getElementById('fileInput');
const playPauseBtn = document.getElementById('playPauseBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const playOverlay = document.getElementById('playOverlay');
const timeDisplay = document.getElementById('timeDisplay');
const timelineTrack = document.getElementById('timelineTrack');
const timelineProgress = document.getElementById('timelineProgress');
const exportModal = document.getElementById('exportModal');
const exportProgress = document.getElementById('exportProgress');
const exportText = document.getElementById('exportText');
const toast = document.getElementById('toast');

// ─── HELPERS ───
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function formatTime(t) {
  if (isNaN(t)) return '0:00.00';
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 100);
  return `${m}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
}

// ─── VIDEO HANDLING ───
uploadOverlay.addEventListener('click', () => fileInput.click());
uploadOverlay.addEventListener('dragover', e => {
  e.preventDefault();
  uploadOverlay.classList.add('dragover');
});
uploadOverlay.addEventListener('dragleave', () => uploadOverlay.classList.remove('dragover'));
uploadOverlay.addEventListener('drop', e => {
  e.preventDefault();
  uploadOverlay.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) loadVideo(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadVideo(e.target.files[0]);
});

function loadVideo(file) {
  const url = URL.createObjectURL(file);
  video.src = url;
  document.getElementById('videoName').textContent = file.name;
  video.addEventListener('loadedmetadata', () => {
    resizeCanvas();
    uploadOverlay.classList.add('hidden');
    container.style.display = 'block';
    state.videoLoaded = true;
    state.strokes = [];
    redraw();
    showToast('Video loaded');
  }, { once: true });
}

function resizeCanvas() {
  const area = document.querySelector('.canvas-area');
  const maxW = area.clientWidth - 20;
  const maxH = area.clientHeight - 20;
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const scale = Math.min(maxW / vw, maxH / vh, 1);
  const w = Math.floor(vw * scale);
  const h = Math.floor(vh * scale);
  video.style.width = w + 'px';
  video.style.height = h + 'px';
  canvas.width = vw;
  canvas.height = vh;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  container.style.width = w + 'px';
  container.style.height = h + 'px';
}
window.addEventListener('resize', () => { if (state.videoLoaded) { resizeCanvas(); redraw(); }});

// Play/Pause
playPauseBtn.addEventListener('click', togglePlay);
canvas.addEventListener('dblclick', togglePlay);

function togglePlay() {
  if (!state.videoLoaded) return;
  if (video.paused) {
    video.play();
    playIcon.style.display = 'none';
    pauseIcon.style.display = 'block';
  } else {
    video.pause();
    playIcon.style.display = 'block';
    pauseIcon.style.display = 'none';
  }
}

// Keyboard shortcut for play/pause
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case ' ': e.preventDefault(); togglePlay(); break;
    case 'l': selectTool('line'); break;
    case 'd': selectTool('dashed'); break;
    case 'a': selectTool('arrow'); break;
    case 'c': selectTool('circle'); break;
    case 'r': selectTool('rect'); break;
    case 'f': selectTool('freehand'); break;
    case 'z': if (e.ctrlKey || e.metaKey) { e.preventDefault(); undo(); } break;
    case 'ArrowLeft': stepFrame(-1); break;
    case 'ArrowRight': stepFrame(1); break;
  }
});

// Timeline update
video.addEventListener('timeupdate', updateTimeline);
function updateTimeline() {
  const pct = (video.currentTime / video.duration) * 100;
  timelineProgress.style.width = pct + '%';
  timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
}

// Timeline scrub
let isScrubbing = false;
timelineTrack.addEventListener('mousedown', e => { isScrubbing = true; scrub(e); });
document.addEventListener('mousemove', e => { if (isScrubbing) scrub(e); });
document.addEventListener('mouseup', () => isScrubbing = false);
function scrub(e) {
  const rect = timelineTrack.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  video.currentTime = pct * video.duration;
  updateTimeline();
}

// Frame stepping
document.getElementById('prevFrame').addEventListener('click', () => stepFrame(-1));
document.getElementById('nextFrame').addEventListener('click', () => stepFrame(1));
function stepFrame(dir) {
  if (!state.videoLoaded) return;
  video.pause();
  playIcon.style.display = 'block';
  pauseIcon.style.display = 'none';
  video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + dir / 30));
}

// ─── TOOL SELECTION ───
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => selectTool(btn.dataset.tool));
});
function selectTool(tool) {
  state.tool = tool;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
}

// ─── COLOR ───
document.querySelectorAll('.color-swatch[data-color]').forEach(sw => {
  sw.addEventListener('click', () => {
    state.color = sw.dataset.color;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    document.getElementById('customColor').value = sw.dataset.color;
  });
});
document.getElementById('customColor').addEventListener('input', e => {
  state.color = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

// ─── STROKE WIDTH ───
document.getElementById('strokeWidth').addEventListener('input', e => {
  state.strokeWidth = parseInt(e.target.value);
  document.getElementById('strokeWidthVal').textContent = state.strokeWidth + 'px';
});

// ─── SPEED ───
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const speed = parseFloat(btn.dataset.speed);
    video.playbackRate = speed;
    state.playbackRate = speed;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.dataset.speed === btn.dataset.speed));
    showToast(`Speed: ${speed}x`);
  });
});

// ─── DRAWING ───
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  state.isDrawing = true;
  const { x, y } = getCanvasCoords(e);
  state.startX = x;
  state.startY = y;

  if (state.tool === 'freehand') {
    state.currentStroke = {
      type: 'freehand',
      color: state.color,
      width: state.strokeWidth,
      points: [{ x, y }]
    };
  } else {
    state.currentStroke = {
      type: state.tool,
      color: state.color,
      width: state.strokeWidth,
      x1: x, y1: y, x2: x, y2: y
    };
  }
});

canvas.addEventListener('mousemove', e => {
  if (!state.isDrawing || !state.currentStroke) return;
  const { x, y } = getCanvasCoords(e);

  if (state.tool === 'freehand') {
    state.currentStroke.points.push({ x, y });
  } else {
    state.currentStroke.x2 = x;
    state.currentStroke.y2 = y;
  }
  redraw();
});

canvas.addEventListener('mouseup', () => {
  if (state.isDrawing && state.currentStroke) {
    state.strokes.push(state.currentStroke);
    state.currentStroke = null;
  }
  state.isDrawing = false;
  redraw();
});

canvas.addEventListener('mouseleave', () => {
  if (state.isDrawing && state.currentStroke) {
    state.strokes.push(state.currentStroke);
    state.currentStroke = null;
  }
  state.isDrawing = false;
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY, button: 0 }));
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY }));
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mouseup', {}));
}, { passive: false });

// ─── RENDER ───
function drawStroke(s) {
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch (s.type) {
    case 'line':
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      break;

    case 'dashed':
      ctx.setLineDash([12, 8]);
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      ctx.setLineDash([]);
      break;

    case 'arrow': {
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(s.x1, s.y1);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
      // Arrowhead
      const angle = Math.atan2(s.y2 - s.y1, s.x2 - s.x1);
      const headLen = 14 + s.width * 2;
      ctx.beginPath();
      ctx.moveTo(s.x2, s.y2);
      ctx.lineTo(s.x2 - headLen * Math.cos(angle - 0.4), s.y2 - headLen * Math.sin(angle - 0.4));
      ctx.moveTo(s.x2, s.y2);
      ctx.lineTo(s.x2 - headLen * Math.cos(angle + 0.4), s.y2 - headLen * Math.sin(angle + 0.4));
      ctx.stroke();
      break;
    }

    case 'circle': {
      ctx.setLineDash([]);
      const rx = Math.abs(s.x2 - s.x1) / 2;
      const ry = Math.abs(s.y2 - s.y1) / 2;
      const cx = (s.x1 + s.x2) / 2;
      const cy = (s.y1 + s.y2) / 2;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      break;
    }

    case 'rect':
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.rect(s.x1, s.y1, s.x2 - s.x1, s.y2 - s.y1);
      ctx.stroke();
      break;

    case 'freehand':
      ctx.setLineDash([]);
      if (s.points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(s.points[0].x, s.points[0].y);
      for (let i = 1; i < s.points.length; i++) {
        ctx.lineTo(s.points[i].x, s.points[i].y);
      }
      ctx.stroke();
      break;
  }
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  state.strokes.forEach(drawStroke);
  if (state.currentStroke) drawStroke(state.currentStroke);
}

// ─── UNDO / CLEAR ───
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('clearBtn').addEventListener('click', () => {
  state.strokes = [];
  redraw();
  showToast('All annotations cleared');
});

function undo() {
  if (state.strokes.length === 0) return;
  state.strokes.pop();
  redraw();
  showToast('Undo');
}

// ─── SAVE / LOAD SESSION ───
document.getElementById('saveSession').addEventListener('click', () => {
  const data = JSON.stringify({ strokes: state.strokes }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'annotator-session.json';
  a.click();
  showToast('Session saved');
});

document.getElementById('loadSession').addEventListener('click', () => {
  document.getElementById('sessionInput').click();
});
document.getElementById('sessionInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.strokes) {
        state.strokes = data.strokes;
        redraw();
        showToast('Session loaded');
      }
    } catch { showToast('Invalid session file'); }
  };
  reader.readAsText(file);
});

// ─── EXPORT VIDEO ───
document.getElementById('saveBtn').addEventListener('click', exportVideo);

async function exportVideo() {
  if (!state.videoLoaded) { showToast('Load a video first'); return; }
  if (state.strokes.length === 0) { showToast('No annotations to export'); return; }

  exportModal.classList.add('show');
  exportProgress.style.width = '0%';
  exportText.textContent = 'Preparing...';

  try {
    // Create offscreen canvas for compositing
    const offCanvas = document.createElement('canvas');
    offCanvas.width = video.videoWidth;
    offCanvas.height = video.videoHeight;
    const offCtx = offCanvas.getContext('2d');

    const stream = offCanvas.captureStream(30);
    // Add audio if available
    if (video.captureStream) {
      const videoStream = video.captureStream();
      const audioTracks = videoStream.getAudioTracks();
      audioTracks.forEach(t => stream.addTrack(t));
    }

    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9'
      : 'video/webm';

    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 5000000 });
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };

    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'annotator-annotated.webm';
      a.click();
      exportModal.classList.remove('show');
      showToast('Video exported!');
    };

    // Reset video to start
    video.currentTime = 0;
    video.playbackRate = 1;

    await new Promise(r => { video.onseeked = r; });

    recorder.start();
    video.play();

    const renderFrame = () => {
      if (video.ended || video.paused) {
        recorder.stop();
        video.playbackRate = state.playbackRate;
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
        return;
      }

      offCtx.drawImage(video, 0, 0);
      // Draw annotations on top
      state.strokes.forEach(s => {
        offCtx.strokeStyle = s.color;
        offCtx.lineWidth = s.width;
        offCtx.lineCap = 'round';
        offCtx.lineJoin = 'round';
        switch (s.type) {
          case 'line':
            offCtx.setLineDash([]);
            offCtx.beginPath(); offCtx.moveTo(s.x1,s.y1); offCtx.lineTo(s.x2,s.y2); offCtx.stroke();
            break;
          case 'dashed':
            offCtx.setLineDash([12,8]);
            offCtx.beginPath(); offCtx.moveTo(s.x1,s.y1); offCtx.lineTo(s.x2,s.y2); offCtx.stroke();
            offCtx.setLineDash([]);
            break;
          case 'arrow': {
            offCtx.setLineDash([]);
            offCtx.beginPath(); offCtx.moveTo(s.x1,s.y1); offCtx.lineTo(s.x2,s.y2); offCtx.stroke();
            const angle = Math.atan2(s.y2-s.y1,s.x2-s.x1);
            const hl = 14+s.width*2;
            offCtx.beginPath();
            offCtx.moveTo(s.x2,s.y2); offCtx.lineTo(s.x2-hl*Math.cos(angle-0.4),s.y2-hl*Math.sin(angle-0.4));
            offCtx.moveTo(s.x2,s.y2); offCtx.lineTo(s.x2-hl*Math.cos(angle+0.4),s.y2-hl*Math.sin(angle+0.4));
            offCtx.stroke();
            break;
          }
          case 'circle': {
            offCtx.setLineDash([]);
            const rx=Math.abs(s.x2-s.x1)/2, ry=Math.abs(s.y2-s.y1)/2;
            offCtx.beginPath(); offCtx.ellipse((s.x1+s.x2)/2,(s.y1+s.y2)/2,rx,ry,0,0,Math.PI*2); offCtx.stroke();
            break;
          }
          case 'rect':
            offCtx.setLineDash([]);
            offCtx.beginPath(); offCtx.rect(s.x1,s.y1,s.x2-s.x1,s.y2-s.y1); offCtx.stroke();
            break;
          case 'freehand':
            offCtx.setLineDash([]);
            if (s.points.length < 2) break;
            offCtx.beginPath(); offCtx.moveTo(s.points[0].x,s.points[0].y);
            for (let i=1;i<s.points.length;i++) offCtx.lineTo(s.points[i].x,s.points[i].y);
            offCtx.stroke();
            break;
        }
      });

      const pct = Math.round((video.currentTime / video.duration) * 100);
      exportProgress.style.width = pct + '%';
      exportText.textContent = pct + '%';

      requestAnimationFrame(renderFrame);
    };
    requestAnimationFrame(renderFrame);

    // Stop when video ends
    video.onended = () => {
      setTimeout(() => {
        if (recorder.state === 'recording') recorder.stop();
      }, 200);
    };

  } catch (err) {
    exportModal.classList.remove('show');
    showToast('Export failed: ' + err.message);
  }
}
</script>
</body>
</html>
